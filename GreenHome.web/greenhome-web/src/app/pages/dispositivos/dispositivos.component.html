<form [formGroup]="form" (ngSubmit)="salvar()">

  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      Dispositivos
    </div>

    <div class="card-body">

      <div class="row g-2">

        <!-- DEVICE ID -->
        <div class="col-md-3 col-12">
          <input class="form-control"
                 placeholder="Device ID (ESP32)"
                 formControlName="deviceId">
        </div>

        <!-- NOME -->
        <div class="col-md-3 col-12">
          <input class="form-control"
                 placeholder="Nome"
                 formControlName="nome">
        </div>

        <!-- VEGETAL -->
        <div class="col-md-3 col-12">
          <select class="form-select" formControlName="vegetalId">
            <option value="">Selecione o vegetal</option>
            <option *ngFor="let v of vegetais" [value]="v.id">
              {{ v.nome }}
            </option>
          </select>
        </div>
        
        <!-- ATIVO -->
        <div class="col-md-1 col-6 d-flex align-items-center">
          <div class="form-check">
            <input class="form-check-input"
                   type="checkbox"
                   formControlName="ativo">
            <label class="form-check-label">Ativo</label>
          </div>
        </div>

        <!-- BOTÃO -->
        <div class="col-md-2 col-6">
          <button class="btn btn-primary w-100" type="submit">
            Salvar
          </button>
        </div>

      </div>

      <hr>

      <!-- LISTA -->
      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>Device</th>
              <th>Nome</th>
              <th>Vegetal</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let d of dispositivos">
              <td>{{ d.deviceId }}</td>
              <td>{{ d.nome }}</td>
              <td>{{ nomeVegetal(d.vegetalId) }}</td>

              <td>
                <span class="badge"
                      [class.bg-success]="d.ativo"
                      [class.bg-secondary]="!d.ativo">
                  {{ d.ativo ? 'Ativo' : 'Inativo' }}
                </span>
              </td>

              <td>
                <button class="btn btn-danger btn-sm"
                        (click)="excluir(d.id)">
                  Excluir
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</form>
